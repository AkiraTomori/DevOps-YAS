name: tax service ci

on:
  push:
    branches:
      - "feature/tax**"  # Chỉ chạy khi push lên feature/tax, feature/tax-*, etc.
    paths:
      - "tax/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/tax-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "tax/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/tax-ci.yaml"
      - "pom.xml"
  workflow_dispatch:  # Cho phép chạy thủ công nếu cần

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Environment
        uses: ./.github/workflows/actions

      # 1. Gitleaks: Kiểm tra lộ Secret (Yêu cầu 7c)
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Build & Install: Cài đặt library dùng chung và build tax (Yêu cầu 5, 6)
      - name: Run Maven Install
        run: mvn clean install -pl tax -am

      # 3. Snyk: Quét bảo mật dependencies (Yêu cầu 7c)
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk Security Scan
        run: snyk test --file=tax/pom.xml --severity-threshold=high
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 4. SonarCloud: Quét chất lượng code (Yêu cầu 7c)
      - name: Analyze with Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -pl tax -am \
          -Dsonar.organization=akiratomori-2 \
          -Dsonar.projectKey=AkiraTomori_DevOps-YAS

      # 5. Kiểm tra độ phủ Testcase > 80% (Yêu cầu 7b)
      - name: Check Coverage Report
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{github.workspace}}/tax/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          title: 'Tax Service Coverage Report'
          update-comment: true

      # 6. Upload kết quả Test (Yêu cầu 5)
      - name: Unit Test Results
        uses: dorny/test-reporter@v1
        if: ${{ always() }}
        with:
          name: Tax-Service-Unit-Test-Results
          path: "tax/target/surefire-reports/*.xml"
          reporter: java-junit

      # 7. Docker Build & Push (Yêu cầu 3)
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./tax
          push: true
          tags: ghcr.io/akiratomori/devops-yas-ga/yas-tax:latest