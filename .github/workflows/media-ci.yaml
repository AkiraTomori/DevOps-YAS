name: media service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    # Loại bỏ logic check Original Repo để ép chạy trên Fork cá nhân
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Environment
        uses: ./.github/workflows/actions

      # 1. Gitleaks: Quét lỗ hổng bảo mật (Yêu cầu 7c) [cite: 72]
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Build & Verify (Yêu cầu 5: Phase test và build) [cite: 58, 64]
      - name: Run Maven Verify
        run: mvn clean verify -pl media -am

      # 3. Snyk: Quét lỗ hổng bảo mật (Yêu cầu 7c) [cite: 72]
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk Security Scan
        run: snyk test --file=media/pom.xml --severity-threshold=high
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 4. SonarCloud: Quét chất lượng code (Yêu cầu 7c) [cite: 54, 72]
      - name: Analyze with Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # Nhớ thêm vào Settings > Secrets
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f media \
          -Dsonar.organization=${{ github.repository_owner }} \
          -Dsonar.projectKey=${{ github.repository_owner }}_yas-media

      # 5. Kiểm tra độ phủ Testcase > 70% (Yêu cầu 7b) [cite: 71]
      - name: Check Coverage Report
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{github.workspace}}/media/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70 
          title: 'Media Service Coverage Report'
          update-comment: true

      # 6. Upload kết quả Test (Yêu cầu 5) [cite: 65]
      - name: Unit Test Results
        uses: dorny/test-reporter@v1
        if: ${{ always() }}
        with:
          name: Media-Service-Unit-Test-Results
          path: "media/target/surefire-reports/*.xml"
          reporter: java-junit

      # 7. Docker Build & Push (Yêu cầu 3) [cite: 58]
      - name: Log in to Registry
        if: ${{ github.ref == 'refs/heads/main' }} # Chỉ chạy khi merge vào main
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./media
          push: true
          tags: ghcr.io/${{ github.repository }}/yas-media:latest