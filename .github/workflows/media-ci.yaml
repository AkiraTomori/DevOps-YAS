name: media service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # Gọi Custom Action để setup JDK 21 và Cache
      - uses: ./.github/workflows/actions

      # 1. Tích hợp Gitleaks (Yêu cầu 7a)
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Build & Verify (Chạy Test + tạo báo cáo JaCoCo) 
      - name: Run Maven Verify
        run: mvn clean verify -pl media -am

      # 3. Tích hợp Snyk (Yêu cầu 7c) 
      - name: Snyk Security Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=media/pom.xml

      # 4. Tích hợp SonarCloud/SonarQube (Yêu cầu 7c) 
      - name: Analyze with Sonar
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Truyền thêm các tham số để override thông tin từ bản fork
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f media \
          -Dsonar.organization=${{ github.repository_owner }} \
          -Dsonar.projectKey=${{ github.repository_owner }}_yas-media

      # 5. Kiểm tra độ phủ Testcase > 70% (Yêu cầu 7b) 
      - name: Check Coverage Report
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/media/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70 
          min-coverage-changed-files: 70
          title: 'Media Service Coverage Report'
          update-comment: true

      # 6. Upload Test Results (Yêu cầu 5) [cite: 65]
      - name: Unit Test Results
        uses: dorny/test-reporter@v1
        if: ${{ always() }}
        with:
          name: Media-Service-Unit-Test-Results
          path: "media/target/surefire-reports/*.xml"
          reporter: java-junit

      # 7. Docker Build & Push (Dành cho việc vận hành)
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./media
          push: true
          tags: ghcr.io/${{ github.repository }}/yas-media:latest